services:
  #db
  db: 
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stock-market-db
    env_file:
      - .env
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mssql-data:/var/opt/mssql
      - ./init:/init

    ports:
      - "${DB_PORT}:1433"
    command: /bin/bash /init/init-db.sh

    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build: .
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 1433
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

volumes:
  mssql-data: